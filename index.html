<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mothcoin</title>

<style>

body{
margin:0;
background:#ffffff;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

#gameArea{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
background:#ffffff;
}

#controls{
height:160px;
display:flex;
justify-content:space-around;
align-items:center;
}

.tapBtn{
width:140px;
height:120px;
border-radius:30px;
background:#777;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:18px;
user-select:none;
}

</style>
</head>

<body>

<div id="gameArea">
<canvas id="game" width="400" height="400"></canvas>
</div>

<div id="controls">

<div class="tapBtn" id="tapLeft">Tap</div>
<div class="tapBtn" id="tapRight">Tap</div>

</div>

<script src="game.js"></script>

</body>
</html>
