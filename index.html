<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mothcoin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 32px;
    }

    p {
      margin-top: 0;
      margin-bottom: 24px;
      color: #666;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a {
      display: block;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #999;
      color: #222;
      background: #f8f8f8;
      font-weight: bold;
    }

    a:hover {
      background: #eeeeee;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mothcoin</h1>
    <p>Simple app shell</p>

    <div class="buttons">
      <a href="login.html">Log In</a>
      <a href="signup.html">Create Account</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>
</body>
</html>
