<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">

<title>Mothcoin Flight</title>

<link rel="manifest" href="manifest.webmanifest">

<style>
.moon-btn{
pointer-events:auto;
border:2px solid var(--btn-border);
background:var(--btn);
color:var(--text);
padding:12px 22px;
border-radius:20px;
font-weight:800;
font-size:14px;
cursor:pointer;
box-shadow:0 3px 0 rgba(0,0,0,0.08);
}
:root{
--bg:#ececec;
--panel:rgba(255,255,255,0.88);
--text:#1f1f1f;
--muted:#6b6b6b;
--line:#505050;
--btn:#f7f7f7;
--btn-border:#888;
--accent:#111;
}

body.dark{
--bg:#141414;
--panel:rgba(20,20,20,0.9);
--text:#f3f3f3;
--muted:#bbbbbb;
--line:#d7d7d7;
--btn:#202020;
--btn-border:#8a8a8a;
--accent:#ffffff;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
padding:0;
background:var(--bg);
color:var(--text);
font-family:Arial,Helvetica,sans-serif;
height:100%;
overflow:hidden;
}

.app{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:12px;
}

.game-shell{
width:100%;
max-width:430px;
position:relative;
}

canvas{
width:100%;
height:auto;
display:block;
border:2px solid var(--line);
background:var(--bg);
image-rendering:pixelated;
image-rendering:crisp-edges;
border-radius:12px;
}

.menu-ui{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
pointer-events:none;
}

.menu-center{
margin-top:-40px;
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
pointer-events:auto;
}

.game-title{
margin:0;
font-size:34px;
letter-spacing:3px;
font-weight:900;
color:var(--accent);
text-align:center;
text-shadow:2px 2px 0 rgba(0,0,0,0.12);
}

.sub{
margin-top:-4px;
font-size:12px;
letter-spacing:2px;
color:var(--muted);
text-transform:uppercase;
}

.dark-row{
display:flex;
align-items:center;
gap:8px;
font-size:14px;
color:var(--text);
text-transform:uppercase;
font-weight:700;
background:var(--btn);
border:2px solid var(--btn-border);
padding:10px 18px;
border-radius:20px;
box-shadow:0 3px 0 rgba(0,0,0,0.08);
}

.dark-row input{
width:18px;
height:18px;
accent-color:#666;
}

.menu-buttons{
display:flex;
gap:12px;
}

button{
pointer-events:auto;
border:2px solid var(--btn-border);
background:var(--btn);
color:var(--text);
padding:12px 22px;
border-radius:20px;
font-weight:800;
font-size:15px;
cursor:pointer;
box-shadow:0 3px 0 rgba(0,0,0,0.08);
}

button:active{
transform:translateY(1px);
}

.controls{
position:absolute;
left:0;
right:0;
bottom:12px;
display:none;
justify-content:center;
pointer-events:none;
}

.controls.show{
display:flex;
}

.jump-btn{
pointer-events:auto;
min-width:120px;
padding:14px 18px;
border-radius:999px;
border:2px solid var(--btn-border);
background:var(--panel);
color:var(--text);
font-size:16px;
font-weight:900;
text-transform:uppercase;
}

</style>
</head>

<body>

<div class="app">
<div class="game-shell">

<canvas id="game" width="420" height="750"></canvas>

<div class="menu-ui" id="menuUI">
<div class="menu-center">

<h1 class="game-title">-- MOTH FLIGHT --</h1>

<div class="sub">Proof of Life</div>

<button id="moonBtn" class="moon-btn">MOONLIGHT</button>

<div class="menu-buttons">
<button id="playBtn">PLAY</button>
</div>

</div>
</div>

<div class="controls" id="controls">
<button class="jump-btn" id="jumpBtn">JUMP</button>
</div>

</div>
</div>

<script src="game.js?v=9"></script>

</body>
</html>
