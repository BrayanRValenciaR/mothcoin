<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Runner</title>
    <style>
      html, body { margin: 0; padding: 0; background:#0b0b0b; color:#eee; font-family: system-ui, Arial; }
      .wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
      canvas { background:#111; border:1px solid #333; border-radius:12px; }
      .hint { position: fixed; bottom: 16px; width: 100%; text-align:center; color:#aaa; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <canvas id="game" width="800" height="260"></canvas>
    </div>
    <div class="hint">Space / ↑ / Click = Jump • R = Restart</div>
    <script src="./game.js"></script>
  </body>
</html>
