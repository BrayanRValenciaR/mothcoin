<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MothCoin</title>
<style>
  * { margin: 0; padding: 0; }
  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  canvas { display: block; }
  #msg {
    font-family: monospace;
    font-size: 13px;
    color: #aaa;
    margin-top: 12px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<canvas id="c" width="800" height="300"></canvas>
<div id="msg">PRESS SPACE TO START</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 40;

let state = 'idle'; // idle | playing | dead
let score = 0;
let hiScore = 0;
let frame = 0;
let speed = 5;

// MOTH
const moth = { x: 80, y: GROUND - 40, w: 40, h: 30, vy: 0 };
const GRAVITY = 0.7;
const JUMP = -14;
let onGround = true;

// OBSTACLES
let obstacles = [];
let obstTimer = 0;
let obstInterval = 90;

// SCORE
let scoreTimer = 0;

function reset() {
  moth.y = GROUND - moth.h;
  moth.vy = 0;
  onGround = true;
  obstacles = [];
  obstTimer = 0;
  score = 0;
  speed = 5;
  frame = 0;
  scoreTimer = 0;
  obstInterval = 90;
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'idle') { state = 'playing'; reset(); }
    else if (state === 'dead') { state = 'playing'; reset(); }
    else if (state === 'playing' && onGround) {
      moth.vy = JUMP;
      onGround = false;
    }
  }
});

function spawnObstacle() {
  const h = 20 + Math.random() * 30;
  obstacles.push({ x: W + 10, w: 18, h: h, y: GROUND - h });
}

function update() {
  if (state !== 'playing') return;
  frame++;

  // score
  scoreTimer++;
  if (scoreTimer % 6 === 0) score++;
  if (score > hiScore) hiScore = score;

  // speed up gradually
  speed = 5 + score * 0.01;
  if (score % 100 === 0 && score > 0) obstInterval = Math.max(45, obstInterval - 1);

  // moth physics
  moth.vy += GRAVITY;
  moth.y  += moth.vy;
  if (moth.y >= GROUND - moth.h) {
    moth.y = GROUND - moth.h;
    moth.vy = 0;
    onGround = true;
  }

  // obstacles
  obstTimer++;
  if (obstTimer >= obstInterval) {
    spawnObstacle();
    obstTimer = 0;
    obstInterval = 60 + Math.random() * 60;
  }
  for (const o of obstacles) o.x -= speed;
  obstacles = obstacles.filter(o => o.x + o.w > -10);

  // collision
  for (const o of obstacles) {
    if (
      moth.x + moth.w - 6 > o.x + 4 &&
      moth.x + 6 < o.x + o.w - 4 &&
      moth.y + moth.h - 4 > o.y
    ) {
      state = 'dead';
    }
  }
}

function drawMoth(x, y) {
  ctx.save();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.8;

  // left wing
  ctx.beginPath();
  ctx.ellipse(x - 10, y + 10, 14, 9, -0.5, 0, Math.PI * 2);
  ctx.stroke();

  // right wing
  ctx.beginPath();
  ctx.ellipse(x + 10, y + 10, 14, 9, 0.5, 0, Math.PI * 2);
  ctx.stroke();

  // body
  ctx.beginPath();
  ctx.ellipse(x, y + 12, 4, 10, 0, 0, Math.PI * 2);
  ctx.stroke();

  // antennae
  ctx.beginPath();
  ctx.moveTo(x - 2, y + 2);
  ctx.quadraticCurveTo(x - 8, y - 8, x - 6, y - 14);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 2, y + 2);
  ctx.quadraticCurveTo(x + 8, y - 8, x + 6, y - 14);
  ctx.stroke();

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // ground line
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();

  // moth
  drawMoth(moth.x + moth.w / 2, moth.y + 4);

  // obstacles (simple pillars)
  ctx.fillStyle = '#000';
  for (const o of obstacles) {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  }

  // score
  ctx.fillStyle = '#555';
  ctx.font = '14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('HI ' + String(hiScore).padStart(5,'0') + '   ' + String(score).padStart(5,'0'), W - 20, 30);

  // messages
  ctx.textAlign = 'center';
  if (state === 'idle') {
    ctx.fillStyle = '#000';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('MOTHCOIN', W/2, H/2 - 20);
    ctx.font = '13px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('PRESS SPACE TO START', W/2, H/2 + 10);
  }
  if (state === 'dead') {
    ctx.fillStyle = '#000';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('GAME OVER', W/2, H/2 - 10);
    ctx.font = '12px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('PRESS SPACE TO RESTART', W/2, H/2 + 16);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
